    <script>
        // Klickschutz fuer Video-Card
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.premium-video-card');
            if (card) {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }

            const releaseCard = document.querySelector('.release-card');
            if (releaseCard) {
                releaseCard.style.opacity = '0';
                releaseCard.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    releaseCard.style.transition = 'all 1s ease-out';
                    releaseCard.style.opacity = '1';
                    releaseCard.style.transform = 'translateY(0)';
                }, 300);
            }
        });
    </script>
