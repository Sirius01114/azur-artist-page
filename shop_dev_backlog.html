<!-- 3. UNUSED JS (BACKUP) -->
<script>
    function switchColor(itemId, swatch) {
        const container = document.getElementById(itemId);
        const img = container.querySelector('.display-img');
        const newSrc = swatch.getAttribute('data-img');
        container.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        img.style.opacity = '0';
        setTimeout(() => {
            img.src = newSrc;
            img.style.opacity = '1';
        }, 300);
    }

    function selectSize(containerId, btn) {
        const container = document.getElementById(containerId);
        container.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
