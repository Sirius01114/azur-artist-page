<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danke für deine Vorbestellung | ΛZUR NASHEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #8fa9ff;
            --bg-color: #05070a;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .bg-fixed-img {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Fotos/azur_stars_background_4k.png?v=2');
            background-size: cover;
            background-position: center;
            z-index: -2;
            opacity: 0.4;
        }

        .background-overlay {
            position: fixed; left: 0; top:0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5,7,10,0.6) 0%, rgba(5,7,10,0.95) 100%);
            z-index: -1;
        }

        .success-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: -30px;
        }

        .logo-img {
            width: 150px;
            filter: drop-shadow(0 0 30px rgba(143, 169, 255, 0.4));
        }

        .brand-name {
            font-family: 'Michroma', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 1.5rem;
            margin-right: -1.5rem;
            background: linear-gradient(180deg, #d1d1d1 0%, #ffffff 40%, #808080 50%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            line-height: 1;
        }

        .brand-sub {
            font-size: 0.7rem;
            letter-spacing: 1rem;
            margin-right: -1rem;
            color: #d1d1d1;
            opacity: 0.6;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .release-date {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(143, 169, 255, 0.3);
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            opacity: 0.5;
        }

        .social-links a { color: white; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="bg-fixed-img"></div>
    <div class="background-overlay"></div>

    <div class="success-container">
        <div class="logo-wrapper">
            <img src="Fotos/LOGO/Logo_transparent.png" alt="ΛZUR Logo" class="logo-img">
        </div>
        <div class="brand-name">ΛZUR</div>
        <div class="brand-sub">NASHEED</div>

        <h1>VIELEN DANK!</h1>
        <p>Deine Vorbestellung war erfolgreich. Du hast dir dein Exemplar von <strong>"ZWISCHEN DUNKELHEIT UND LICHT"</strong> gesichert.</p>
        
        <div class="release-date">RELEASE: 15. MAI 2026</div>

        <p style="font-size: 0.9rem; opacity: 0.6;">Du erhältst am Release-Tag eine E-Mail mit deinem exklusiven Download-Link an die bei Stripe hinterlegte Adresse.</p>

        <a href="index.html" class="btn-home">ZURÜCK ZUR STARTSEITE</a>

        <div class="social-links">
            <!-- Icons would go here -->
        </div>
    </div>
</body>
</html>
